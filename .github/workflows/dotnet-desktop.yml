name: Wriststone CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: 'ubuntu-22.04'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Refresh test results
        run: |
          if (Test-Path ./coverage){
            Remove-Item -Path ./coverage -Recurse -Force 
          }
          New-Item -Path ./coverage -ItemType Directory | Out-Null
        shell: pwsh

      - name: Run tests
        run: dotnet test --no-build -c Release --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
      #- name: Publish API
      #  run: dotnet publish Wriststone.Wriststone/Wriststone.Wriststone.API/Wriststone.Wriststone.API.csproj -c Release --output ./publish --no-build

      #- name: Upload published files
      #  uses: actions/upload-artifact@v4
