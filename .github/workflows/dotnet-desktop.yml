name: Wriststone CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: 'ubuntu-22.04'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --verbosity normal

      - name: Publish API
        run: dotnet publish Wriststone.Wriststone/Wriststone.Wriststone.API/Wriststone.Wriststone.API.csproj --configuration Release --output ./publish --no-build

      - name: Upload published files
        uses: actions/upload-artifact@v4
        with:
          name: wriststone-app
          path: ./publish
